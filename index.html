<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alarm Clock</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="clock" id="clock">00:00:00</div>

    <div class="alarm-section">
      <label class="label">アラーム時刻</label>
      <input type="time" id="alarmTime" class="time-input" />
      <button id="toggleBtn" class="btn btn-set">セット</button>
    </div>

    <div class="status" id="status">アラームが設定されていません</div>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="bell">🔔</div>
      <p class="modal-text">アラーム！</p>
      <button class="btn btn-stop" id="stopBtn">止める</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
